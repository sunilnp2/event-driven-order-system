version: "3.8"

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: sunil
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunil -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  activemq:
    image: apache/activemq-classic:5.18.4
    ports:
      - "61613:61613"
      - "8161:8161"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/61613' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  dbmate:
    image: ghcr.io/amacneil/dbmate:2.7.0
    command: --wait up
    environment:
      DATABASE_URL: "postgres://sunil:postgres@db:5432/orderdb?sslmode=disable"
    volumes:
      - ./db:/db
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sunil:postgres@db:5432/orderdb
      ACTIVEMQ_HOST: activemq
      ACTIVEMQ_PORT: 61613
      ACTIVEMQ_USERNAME: admin
      ACTIVEMQ_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
      activemq:
        condition: service_healthy
      dbmate:
        condition: service_completed_successfully

volumes:
  postgres_data: